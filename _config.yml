title: Moss GU
description: Notes, essays, and open-source AI projects by Moss GU.
url: https://mossgreen.github.io
baseurl: ""
locale: en-US
lang: en

author:
  name: Moss GU
  email: gufeifeizi@gmail.com
  twitter: gufeifei

image: /assets/og-default.png

twitter:
  username: gufeifei
  card: summary_large_image

social:
  type: Person
  name: Moss GU
  links:
    - https://github.com/mossgreen
    - https://www.linkedin.com/in/mossgu/
    - https://designiscode.ai
    - https://twitter.com/gufeifei

# Analytics — set `goatcounter` to your GoatCounter code to enable
# (sign up free at goatcounter.com; the snippet loads nothing until set).
analytics:
  goatcounter: ""

logo: /assets/og-default.png

include:
  - _pages

exclude:
  - vendor
  - .bundle
  - .jekyll-cache
  - bin
  - linkedin-comment-drafts.md
  - README.md

permalink: /:categories/:title/
paginate: 1000
paginate_path: /page:num/

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  smart_quotes: lsquo,rsquo,ldquo,rdquo

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate
  - jemoji

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      image: /assets/og-default.png
  - scope:
      path: "_pages"
    values:
      layout: page
