---
layout: default
---
<article>
  {%- if page.title -%}<h1>{{ page.title }}</h1>{%- endif -%}
  {%- if page.content and page.content != "" -%}
    <div class="post-content">{{ content }}</div>
  {%- endif -%}
  <ul class="post-list tabular-nums">
    {%- for post in site.posts -%}
      {%- include post-list-item.html post=post -%}
    {%- endfor -%}
  </ul>
</article>
