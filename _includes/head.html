<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function() {
      try {
        var stored = localStorage.theme;
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('theme-dark');
        }
      } catch (e) {}
    })();
    (function() {
      try {
        // Sidebar starts open on wide screens unless the user closed it;
        // on narrow screens it is always a closed overlay drawer.
        if (window.innerWidth >= 1100 && localStorage.sidebar !== 'closed') {
          document.documentElement.classList.add('sidebar-open');
        }
      } catch (e) {}
    })();
  </script>
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="32x32">
  <link rel="icon" href="{{ '/assets/icon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  {%- seo -%}
</head>
